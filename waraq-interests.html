<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورق — اختر اهتماماتك</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --cream: #f5f0e8;
    --warm: #f0e6d0;
    --gold: #c9973a;
    --gold-light: #e8b84b;
    --rust: #b84c2a;
    --sage: #4a7c59;
    --muted: #8c7b68;
    --border: rgba(139,110,60,0.15);
    --card-bg: #fffdf7;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--ink);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* NOISE */
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:100;
  }

  /* BACKGROUND GLOW */
  .bg-glow {
    position: fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(201,151,58,.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 85% 80%, rgba(184,76,42,.08) 0%, transparent 55%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(74,124,89,.05) 0%, transparent 60%);
    transition: background 1s ease;
  }

  /* WRAPPER */
  .wrapper {
    width: 100%; max-width: 680px;
    padding: 48px 24px 120px;
    position: relative; z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown .6s ease both;
  }

  .logo-mark {
    width: 52px; height: 52px;
    background: var(--gold);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Amiri', serif; font-size: 26px;
    color: var(--ink); font-weight: 700;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(201,151,58,.3);
    animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
  }

  .step-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 24px;
    animation: fadeDown .5s ease both .06s;
  }

  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.15);
    transition: all .3s;
  }
  .step-dot.done { background: var(--sage); }
  .step-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }

  .header h1 {
    font-family: 'Amiri', serif;
    font-size: 36px; line-height: 1.25;
    color: var(--cream);
    margin-bottom: 10px;
    animation: fadeDown .5s ease both .1s;
  }

  .header h1 span { color: var(--gold); }

  .header p {
    font-size: 14px; color: rgba(240,230,208,.5);
    line-height: 1.7; max-width: 400px; margin: 0 auto;
    animation: fadeDown .5s ease both .15s;
  }

  /* SEARCH */
  .search-wrap {
    position: relative; margin-bottom: 28px;
    animation: fadeUp .5s ease both .2s;
  }

  .search-input {
    width: 100%; padding: 14px 48px 14px 18px;
    background: rgba(255,255,255,.06);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 14px;
    color: var(--cream); font-size: 14px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    outline: none; transition: all .2s; direction: rtl;
  }

  .search-input:focus {
    border-color: rgba(201,151,58,.4);
    background: rgba(201,151,58,.06);
  }

  .search-input::placeholder { color: rgba(255,255,255,.25); }

  .search-icon {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,.25); pointer-events: none;
  }
  .search-icon svg { width: 16px; height: 16px; display: block; }

  /* CATEGORIES */
  .category-section {
    margin-bottom: 24px;
    animation: fadeUp .5s ease both;
  }

  .category-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,.25);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .category-label::after {
    content:''; flex:1; height:1px;
    background: rgba(255,255,255,.07);
  }

  .chips-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
  }

  /* CHIP */
  .chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 100px;
    border: 1.5px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.05);
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: rgba(240,230,208,.65);
    transition: all .2s;
    user-select: none;
    position: relative; overflow: hidden;
  }

  .chip::before {
    content:''; position: absolute; inset: 0;
    opacity: 0; transition: opacity .2s;
    border-radius: inherit;
  }

  .chip:hover {
    border-color: rgba(255,255,255,.25);
    color: var(--cream);
    transform: translateY(-1px);
  }

  .chip.selected {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,151,58,.12);
    font-weight: 600;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(201,151,58,.15);
  }

  .chip.selected::after {
    content: '✓';
    font-size: 11px;
    margin-right: 2px;
  }

  .chip-emoji { font-size: 16px; line-height: 1; }

  /* SELECTED COUNT */
  .selection-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 24px 32px;
    background: linear-gradient(transparent, var(--ink) 30%);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
  }

  .selection-info {
    font-size: 13px; color: rgba(255,255,255,.4);
    white-space: nowrap;
    transition: color .3s;
  }

  .selection-info.has-items { color: var(--gold); }

  .selection-info strong {
    font-family: 'Amiri', serif; font-size: 18px;
    color: var(--gold-light);
  }

  .btn-continue {
    flex: 1; max-width: 320px;
    padding: 14px 28px;
    background: var(--gold);
    color: var(--ink);
    border: none; border-radius: 14px;
    cursor: pointer; font-size: 15px; font-weight: 700;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    transition: all .25s;
    position: relative; overflow: hidden;
    opacity: 0.4; pointer-events: none;
  }

  .btn-continue.ready {
    opacity: 1; pointer-events: all;
    box-shadow: 0 8px 24px rgba(201,151,58,.3);
  }

  .btn-continue.ready:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(201,151,58,.4);
  }

  .btn-continue::after {
    content: '←';
    margin-right: 8px;
  }

  .btn-skip {
    font-size: 13px; color: rgba(255,255,255,.25);
    background: none; border: none; cursor: pointer;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    transition: color .2s; padding: 8px; white-space: nowrap;
  }
  .btn-skip:hover { color: rgba(255,255,255,.5); }

  /* SELECTED CHIPS PREVIEW */
  .selected-preview {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    max-width: 500px; padding: 0 16px;
    z-index: 49;
    transition: all .3s;
    pointer-events: none;
  }

  .preview-chip {
    padding: 5px 12px; border-radius: 100px;
    background: rgba(201,151,58,.15); border: 1px solid rgba(201,151,58,.3);
    font-size: 11px; color: var(--gold-light); font-weight: 500;
    animation: popIn .25s cubic-bezier(.175,.885,.32,1.275) both;
  }

  /* HIDDEN */
  .chip.hidden { display: none; }

  /* ANIMATIONS */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  @keyframes shimmer { from{transform:translateX(100%)} to{transform:translateX(-100%)} }

  /* CATEGORY ANIMATION DELAYS */
  .cat-0 { animation-delay: .22s; }
  .cat-1 { animation-delay: .28s; }
  .cat-2 { animation-delay: .34s; }
  .cat-3 { animation-delay: .40s; }
  .cat-4 { animation-delay: .46s; }

  @media(max-width: 480px) {
    .wrapper { padding: 36px 16px 130px; }
    .header h1 { font-size: 28px; }
    .chip { font-size: 12px; padding: 8px 13px; }
  }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-mark">و</div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <h1>ما الذي يشغل <span>تفكيرك؟</span></h1>
    <p>اختر اهتماماتك وسيقترح لك ورق محتوى مناسباً تماماً من أول يوم</p>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" class="search-input" placeholder="ابحث عن اهتمام..." id="searchInput" oninput="filterChips(this.value)">
    <div class="search-icon">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div id="categoriesContainer"></div>

</div>

<!-- SELECTED PREVIEW -->
<div class="selected-preview" id="selectedPreview"></div>

<!-- BOTTOM BAR -->
<div class="selection-bar">
  <span class="selection-info" id="selectionInfo">اختر ما يناسبك</span>
  <button class="btn-continue" id="btnContinue" onclick="goNext()">ابدأ رحلتك</button>
  <button class="btn-skip" onclick="window.location='waraq-app.html'">تخطّ</button>
</div>

<script>
  const categories = [
    {
      label: 'العلوم والمعرفة',
      items: [
        { id: 'psychology', emoji: '🧠', label: 'علم النفس' },
        { id: 'science', emoji: '🔬', label: 'علوم' },
        { id: 'history', emoji: '🏛', label: 'تاريخ وحضارة' },
        { id: 'philosophy', emoji: '💡', label: 'فلسفة' },
        { id: 'geography', emoji: '🌍', label: 'جغرافيا' },
        { id: 'neuroscience', emoji: '🧬', label: 'علم الأعصاب' },
        { id: 'astronomy', emoji: '🔭', label: 'فلك وفضاء' },
      ]
    },
    {
      label: 'التطوير والأعمال',
      items: [
        { id: 'selfdev', emoji: '🚀', label: 'تطوير الذات' },
        { id: 'entrepreneurship', emoji: '💼', label: 'ريادة أعمال' },
        { id: 'productivity', emoji: '⚡', label: 'الإنتاجية' },
        { id: 'leadership', emoji: '🎯', label: 'قيادة' },
        { id: 'economics', emoji: '📈', label: 'اقتصاد ومال' },
        { id: 'marketing', emoji: '📣', label: 'تسويق' },
      ]
    },
    {
      label: 'الأدب والفنون',
      items: [
        { id: 'arabic-lit', emoji: '📖', label: 'أدب عربي' },
        { id: 'poetry', emoji: '✍️', label: 'شعر' },
        { id: 'arts', emoji: '🎨', label: 'فنون' },
        { id: 'fiction', emoji: '📚', label: 'روايات' },
        { id: 'cinema', emoji: '🎬', label: 'سينما وثقافة بصرية' },
      ]
    },
    {
      label: 'التقنية والمستقبل',
      items: [
        { id: 'tech', emoji: '🤖', label: 'تقنية' },
        { id: 'ai', emoji: '💻', label: 'ذكاء اصطناعي' },
        { id: 'future', emoji: '🌐', label: 'مستقبل وتوقعات' },
        { id: 'environment', emoji: '🌱', label: 'بيئة واستدامة' },
      ]
    },
    {
      label: 'الدين والروح',
      items: [
        { id: 'religion', emoji: '🕌', label: 'دين وروحانيات' },
        { id: 'ethics', emoji: '⚖️', label: 'أخلاق وقيم' },
        { id: 'heritage', emoji: '📜', label: 'تراث إسلامي' },
        { id: 'meditation', emoji: '🧘', label: 'تأمل وهدوء نفس' },
      ]
    },
  ];

  let selected = new Set();

  function buildUI() {
    const container = document.getElementById('categoriesContainer');
    categories.forEach((cat, ci) => {
      const section = document.createElement('div');
      section.className = `category-section cat-${ci}`;
      section.dataset.catIndex = ci;

      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = cat.label;
      section.appendChild(label);

      const grid = document.createElement('div');
      grid.className = 'chips-grid';

      cat.items.forEach(item => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.id = item.id;
        chip.dataset.label = item.label;
        chip.dataset.cat = ci;
        chip.innerHTML = `<span class="chip-emoji">${item.emoji}</span>${item.label}`;
        chip.addEventListener('click', () => toggleChip(chip, item));
        grid.appendChild(chip);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });
  }

  function toggleChip(chip, item) {
    if (selected.has(item.id)) {
      selected.delete(item.id);
      chip.classList.remove('selected');
    } else {
      selected.add(item.id);
      chip.classList.add('selected');
    }
    updateUI();
    updateGlow();
  }

  function updateUI() {
    const count = selected.size;
    const info = document.getElementById('selectionInfo');
    const btn = document.getElementById('btnContinue');
    const preview = document.getElementById('selectedPreview');

    // Update info
    if (count === 0) {
      info.textContent = 'اختر ما يناسبك';
      info.classList.remove('has-items');
    } else {
      info.innerHTML = `اخترت <strong>${count}</strong> اهتمام`;
      info.classList.add('has-items');
    }

    // Enable/disable button
    if (count > 0) {
      btn.classList.add('ready');
    } else {
      btn.classList.remove('ready');
    }

    // Update preview chips
    preview.innerHTML = '';
    if (count > 0 && count <= 6) {
      selected.forEach(id => {
        const item = findItem(id);
        if (item) {
          const chip = document.createElement('div');
          chip.className = 'preview-chip';
          chip.textContent = item.emoji + ' ' + item.label;
          preview.appendChild(chip);
        }
      });
    } else if (count > 6) {
      const chip = document.createElement('div');
      chip.className = 'preview-chip';
      chip.textContent = `${count} اهتمام مختار ✓`;
      preview.appendChild(chip);
    }
  }

  function findItem(id) {
    for (const cat of categories) {
      const item = cat.items.find(i => i.id === id);
      if (item) return item;
    }
    return null;
  }

  function updateGlow() {
    // Change background glow based on selected categories
    const glow = document.getElementById('bgGlow');
    const count = selected.size;
    if (count === 0) {
      glow.style.background = `
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(201,151,58,.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(184,76,42,.08) 0%, transparent 55%)`;
    } else if (count < 5) {
      glow.style.background = `
        radial-gradient(ellipse 70% 50% at 20% 30%, rgba(201,151,58,.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(74,124,89,.1) 0%, transparent 55%)`;
    } else {
      glow.style.background = `
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(201,151,58,.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 75% 65%, rgba(74,124,89,.12) 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 60% 20%, rgba(184,76,42,.08) 0%, transparent 50%)`;
    }
  }

  function filterChips(query) {
    const q = query.trim().toLowerCase();
    const sections = document.querySelectorAll('.category-section');

    sections.forEach(section => {
      const chips = section.querySelectorAll('.chip');
      let anyVisible = false;

      chips.forEach(chip => {
        const label = chip.dataset.label.toLowerCase();
        if (!q || label.includes(q)) {
          chip.classList.remove('hidden');
          anyVisible = true;
        } else {
          chip.classList.add('hidden');
        }
      });

      section.style.display = anyVisible ? 'block' : 'none';
    });
  }

  function goNext() {
    if (selected.size === 0) return;

    // Save to localStorage simulation
    const btn = document.getElementById('btnContinue');
    btn.textContent = 'جارٍ التهيئة...';
    btn.style.opacity = '0.7';

    // Animate chips
    document.querySelectorAll('.chip.selected').forEach((chip, i) => {
      setTimeout(() => {
        chip.style.transform = 'scale(1.05)';
        chip.style.boxShadow = '0 8px 24px rgba(201,151,58,.3)';
      }, i * 40);
    });

    setTimeout(() => {
      window.location = 'waraq-app.html';
    }, 900);
  }

  // Init
  buildUI();
</script>
</body>
</html>
